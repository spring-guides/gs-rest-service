name: Build and Test

on:
  push:
    branches: [ "master", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Post to Slack
      uses: slackapi/slack-github-action@v1.26.0
      with:
        channel-id: 'C0B1EP1JCLE'
        slack-message: "Build and test pipeline started <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Click here>"
      env:
        SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build and Test with Maven
      run: cd ./complete && mvn -B test --file pom.xml

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./complete
        file: ./complete/Dockerfile
        push: true
        tags: markobugbg/gs-rest-service:${{ github.run_id }}
        
    - name: Post to Slack
      uses: slackapi/slack-github-action@v1.26.0
      with:
        channel-id: 'C0B1EP1JCLE'
        slack-message: "Build and test pipeline finished"
      env:
        SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
